<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Blue sphere gradient -->
    <radialGradient id="blueSphere" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <!-- Purple sphere gradient -->
    <radialGradient id="purpleSphere" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <!-- Teal sphere gradient -->
    <radialGradient id="tealSphere" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
  </defs>

  <!-- Curved connecting lines -->
  <path d="M 240 140 Q 190 240 148 320" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.35"/>
  <path d="M 272 140 Q 320 240 364 320" stroke="#06b6d4" stroke-width="2.5" fill="none" opacity="0.35"/>
  <path d="M 168 350 Q 256 370 344 350" stroke="#8b5cf6" stroke-width="2.5" fill="none" opacity="0.35"/>

  <!-- Blue sphere (top) -->
  <circle cx="256" cy="125" r="56" fill="url(#blueSphere)"/>
  <ellipse cx="244" cy="110" rx="16" ry="10" fill="white" opacity="0.3" transform="rotate(-15 244 110)"/>

  <!-- Purple sphere (bottom-left) -->
  <circle cx="148" cy="335" r="56" fill="url(#purpleSphere)"/>
  <ellipse cx="136" cy="320" rx="16" ry="10" fill="white" opacity="0.3" transform="rotate(-15 136 320)"/>

  <!-- Teal sphere (bottom-right) -->
  <circle cx="364" cy="335" r="56" fill="url(#tealSphere)"/>
  <ellipse cx="352" cy="320" rx="16" ry="10" fill="white" opacity="0.3" transform="rotate(-15 352 320)"/>
</svg>