name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [staging]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine environment
        id: env
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "api_url=https://arimatch1-crewhub.hf.space" >> "$GITHUB_OUTPUT"
            echo "cf_project=crewhub-marketplace" >> "$GITHUB_OUTPUT"
            echo "fb_api_key=AIzaSyDq4iZ6y90S9KOsPRP0774iYGu4fXzH-4s" >> "$GITHUB_OUTPUT"
            echo "fb_auth_domain=ai-digital-crew.firebaseapp.com" >> "$GITHUB_OUTPUT"
            echo "fb_project_id=ai-digital-crew" >> "$GITHUB_OUTPUT"
            echo "fb_storage_bucket=ai-digital-crew.firebasestorage.app" >> "$GITHUB_OUTPUT"
            echo "fb_messaging_sender_id=67125394484" >> "$GITHUB_OUTPUT"
            echo "fb_app_id=1:67125394484:web:85f3da113a0b09aeb39e61" >> "$GITHUB_OUTPUT"
          else
            echo "api_url=https://arimatch1-crewhub-staging.hf.space" >> "$GITHUB_OUTPUT"
            echo "cf_project=crewhub-marketplace-staging" >> "$GITHUB_OUTPUT"
            echo "fb_api_key=AIzaSyAH9dWeeHoH6v_UvnhpvLUKoqsm3rrdCPQ" >> "$GITHUB_OUTPUT"
            echo "fb_auth_domain=ai-digital-crew-staging.firebaseapp.com" >> "$GITHUB_OUTPUT"
            echo "fb_project_id=ai-digital-crew-staging" >> "$GITHUB_OUTPUT"
            echo "fb_storage_bucket=ai-digital-crew-staging.firebasestorage.app" >> "$GITHUB_OUTPUT"
            echo "fb_messaging_sender_id=155089534574" >> "$GITHUB_OUTPUT"
            echo "fb_app_id=1:155089534574:web:542a7df0b8c809f22c707f" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.env.outputs.api_url }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ steps.env.outputs.fb_api_key }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ steps.env.outputs.fb_auth_domain }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ steps.env.outputs.fb_project_id }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ steps.env.outputs.fb_storage_bucket }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ steps.env.outputs.fb_messaging_sender_id }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ steps.env.outputs.fb_app_id }}
        run: STATIC_EXPORT=true npm run build

      - name: Prepare SPA fallbacks for dynamic routes
        working-directory: frontend/out
        run: |
          # Next.js static export generates shell pages as _.html for dynamic
          # [id]/[slug] routes. Cloudflare's asset serving 308-redirects
          # _.html to _/ (directory), so we rename the shell files to avoid
          # the conflict, then use a _worker.js to serve them for dynamic paths.
          mv agents/_.html agents/__shell.html
          mv categories/_.html categories/__shell.html
          mv dashboard/tasks/_.html dashboard/tasks/__shell.html
          mv admin/agents/_.html admin/agents/__shell.html

          cat > _worker.js << 'WORKER'
          export default {
            async fetch(request, env) {
              const url = new URL(request.url);
              const path = url.pathname;

              // Dynamic route patterns → serve the shell page directly
              const rewrites = [
                { pattern: /^\/agents\/[^/]+$/, shell: '/agents/__shell.html' },
                { pattern: /^\/categories\/[^/]+$/, shell: '/categories/__shell.html' },
                { pattern: /^\/dashboard\/tasks\/[^/]+$/, shell: '/dashboard/tasks/__shell.html' },
                { pattern: /^\/admin\/agents\/[^/]+$/, shell: '/admin/agents/__shell.html' },
              ];

              for (const { pattern, shell } of rewrites) {
                if (pattern.test(path)) {
                  const shellUrl = new URL(shell, url.origin);
                  const shellResp = await env.ASSETS.fetch(new Request(shellUrl));
                  // Return shell HTML with 200 status, bypassing Cloudflare 308
                  return new Response(shellResp.body, {
                    status: 200,
                    headers: { 'Content-Type': 'text/html; charset=utf-8' },
                  });
                }
              }

              // All other requests: serve static assets normally
              return env.ASSETS.fetch(request);
            }
          };
          WORKER

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/out --project-name=${{ steps.env.outputs.cf_project }}
