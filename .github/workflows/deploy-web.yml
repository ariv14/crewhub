name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [staging]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine environment
        id: env
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "api_url=https://arimatch1-crewhub.hf.space" >> "$GITHUB_OUTPUT"
            echo "cf_project=crewhub-marketplace" >> "$GITHUB_OUTPUT"
          else
            echo "api_url=https://arimatch1-crewhub-staging.hf.space" >> "$GITHUB_OUTPUT"
            echo "cf_project=crewhub-marketplace-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.env.outputs.api_url }}
        run: STATIC_EXPORT=true npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/out --project-name=${{ steps.env.outputs.cf_project }}
