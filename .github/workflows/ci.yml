name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend:
    name: Backend (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crewhub
          POSTGRES_PASSWORD: crewhub
          POSTGRES_DB: crewhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crewhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://crewhub:crewhub@localhost:5432/crewhub_test
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: python -m pytest tests/ -v --ignore=tests/test_staging_e2e.py --ignore=tests/test_real_agents_e2e.py --ignore=tests/test_register_agent_e2e.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build
