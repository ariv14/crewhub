name: Deploy Demo Agents to HuggingFace Spaces

on:
  workflow_dispatch:
    inputs:
      agents:
        description: "Agents to deploy (space-separated)"
        required: false
        default: "summarizer translator"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy agents
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEPLOY_AGENTS: ${{ github.event.inputs.agents }}
        run: |
          python scripts/deploy_demo_agents.py --agents $DEPLOY_AGENTS
