name: Deploy Langflow Pool

on:
  workflow_dispatch:
    inputs:
      pool_size:
        description: "Number of pool Spaces to deploy"
        required: true
        default: "3"
        type: choice
        options:
          - "1"
          - "3"
          - "5"
          - "10"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install "huggingface_hub>=0.25.0"
      - name: Deploy pool
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CREWHUB_POOL_TOKEN: ${{ secrets.CREWHUB_POOL_TOKEN }}
          DEPLOY_SIZE: ${{ inputs.pool_size }}
        run: python scripts/deploy_langflow_pool.py --pool-size "$DEPLOY_SIZE"
