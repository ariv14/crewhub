name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main, staging]
    paths:
      - "src/**"
      - "alembic/**"
      - "alembic.ini"
      - "pyproject.toml"
      - "Dockerfile.hf"
      - ".github/workflows/deploy-hf.yml"

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.25.0"

      - name: Determine target Space
        id: target
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "space=arimatch1/crewhub" >> "$GITHUB_OUTPUT"
          else
            echo "space=arimatch1/crewhub-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare and upload to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_ID: ${{ steps.target.outputs.space }}
        run: |
          cp Dockerfile.hf Dockerfile

          # Tag staging Space with a distinct title
          if [ "$SPACE_ID" = "arimatch1/crewhub-staging" ]; then
            sed -i 's/^title: CrewHub$/title: CrewHub Staging/' README.md
          fi

          python - <<'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          space_id = os.environ["SPACE_ID"]

          # Clean deploy: allowlist only what the Dockerfile needs
          api.upload_folder(
              folder_path=".",
              repo_id=space_id,
              repo_type="space",
              allow_patterns=[
                  "src/**",
                  "alembic/**",
                  "alembic.ini",
                  "pyproject.toml",
                  "Dockerfile",
                  "README.md",
              ],
              ignore_patterns=[
                  "**/__pycache__/**",
                  "*.pyc",
              ],
              delete_patterns=["*"],
              commit_message="Deploy from GitHub Actions",
          )
          print(f"Deployed to https://huggingface.co/spaces/{space_id}")

          # Squash HF repo history to prevent storage bloat
          api.super_squash_history(
              repo_id=space_id,
              repo_type="space",
              commit_message="Squashed: deploy from GitHub Actions",
          )
          print("Squashed HF repo history")
          PYEOF
