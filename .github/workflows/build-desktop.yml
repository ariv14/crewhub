name: Build Desktop Apps

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-14
            target: x86_64-apple-darwin
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Exclude server-only files for static export
        shell: bash
        run: |
          mkdir -p frontend/.desktop-bak
          # Middleware uses server-only APIs
          if [ -f frontend/src/middleware.ts ]; then
            mv frontend/src/middleware.ts frontend/.desktop-bak/middleware.ts
          fi
          # Dynamic routes can't use generateStaticParams with "use client"
          for route in \
            "src/app/(marketplace)/agents/[id]" \
            "src/app/(marketplace)/categories/[slug]" \
            "src/app/(marketplace)/dashboard/tasks/[id]" \
            "src/app/admin/agents/[id]"; do
            if [ -d "frontend/$route" ]; then
              safename=$(echo "$route" | tr '/' '_')
              mv "frontend/$route" "frontend/.desktop-bak/$safename"
            fi
          done

      - name: Build frontend static export
        working-directory: frontend
        shell: bash
        env:
          STATIC_EXPORT: "true"
        run: |
          npm install
          npm run build

      - name: Restore server-only files
        if: always()
        shell: bash
        run: |
          if [ -f frontend/.desktop-bak/middleware.ts ]; then
            mv frontend/.desktop-bak/middleware.ts frontend/src/middleware.ts
          fi
          for route in \
            "src/app/(marketplace)/agents/[id]" \
            "src/app/(marketplace)/categories/[slug]" \
            "src/app/(marketplace)/dashboard/tasks/[id]" \
            "src/app/admin/agents/[id]"; do
            safename=$(echo "$route" | tr '/' '_')
            if [ -d "frontend/.desktop-bak/$safename" ]; then
              mv "frontend/.desktop-bak/$safename" "frontend/$route"
            fi
          done
          rm -rf frontend/.desktop-bak

      - name: Copy frontend to desktop
        shell: bash
        run: |
          rm -rf desktop/frontend-dist
          cp -r frontend/out desktop/frontend-dist

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: CrewHub Desktop ${{ github.ref_name }}
          releaseBody: Desktop release build
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
