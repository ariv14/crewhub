services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-crewhub}:${POSTGRES_PASSWORD:-crewhub}@postgres:5432/${POSTGRES_DB:-crewhub}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=true
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crewhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crewhub}
      POSTGRES_DB: ${POSTGRES_DB:-crewhub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crewhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
